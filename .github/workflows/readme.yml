name: App Readme Generator

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 every day
  # workflow_dispatch: # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Required to allow the action to update the README file
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: GitHub README Generator
        uses: bitflight-devops/github-action-readme-generator@v1.10.3
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TIMEZONE: "Asia/Kolkata"
